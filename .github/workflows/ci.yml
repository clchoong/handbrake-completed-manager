name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\desktop\HandBrakeCompletedManager.sln

      - name: Build
        run: dotnet build .\desktop\HandBrakeCompletedManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\desktop\HandBrakeCompletedManager.sln --configuration Release --no-build
